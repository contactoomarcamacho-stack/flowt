<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICION TV PRO - 55"</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        :root {
            --bg0: #07090e; --bg1: #0b0e16; --bg2: #0f1219;
            --bg4: #181d2a; --bg5: #1e2434; --border: rgba(255,255,255,0.06);
            --accent: #2dff6e; --text: #dde2ed; --text3: #4d566b; --radius: 14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg0); color: var(--text);
            font-family: 'Barlow', sans-serif; font-size: 18px;
            height: 100vh; overflow: hidden;
        }

        /* LAYOUT TV 55" (LISTA A UN COSTADO) */
        #app { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: opacity .5s; }
        #app.in { opacity: 1; }

        #main-container { flex: 7.5; display: flex; flex-direction: column; background: #000; position: relative; border-right: 1px solid var(--border); }
        #side-panel { flex: 2.5; display: flex; flex-direction: column; background: var(--bg1); min-width: 380px; }

        /* PLAYER */
        #player-wrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; }
        video#vid { width: 100%; height: 100%; object-fit: contain; outline: none; }

        /* LISTA DE CANALES */
        #nav { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); }
        .nav-t { flex: 1; padding: 22px; border: none; background: none; color: var(--text3); font-family: 'Barlow Condensed'; font-weight: 700; cursor: pointer; font-size: 16px; letter-spacing: 1px; }
        .nav-t.on { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(45,255,110,0.05); }

        #clist { flex: 1; overflow-y: auto; padding: 10px; }
        #clist::-webkit-scrollbar { width: 6px; }
        #clist::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 10px; }

        .chi {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            border-radius: var(--radius); margin-bottom: 8px; cursor: pointer;
            border: 1px solid transparent; transition: 0.2s;
        }
        .chi:hover { background: var(--bg4); }
        .chi.active { background: rgba(45,255,110,0.12); border-color: var(--accent); }

        .chi-logo { width: 65px; height: 65px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; padding: 5px; }
        .chi-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .chi-name { font-weight: 600; font-size: 19px; margin-bottom: 4px; }
        .chi-grp { font-size: 12px; color: var(--accent); font-weight: 700; opacity: 0.7; text-transform: uppercase; }

        /* OVERLAYS */
        #ld-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display:none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #ld-overlay.on { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--bg5); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #sbar { height: 50px; background: var(--bg2); display: flex; align-items: center; padding: 0 20px; font-size: 14px; color: var(--text3); border-top: 1px solid var(--border); }

        #no-sig { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #07090e; color: var(--text3); z-index: 1; text-align: center; }
        #no-sig.hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="main-container">
        <div id="player-wrap">
            <div id="no-sig"><h2>SELECCIONÁ UN CANAL<br><small style="font-size: 12px; letter-spacing: 2px;">VICION TV PRO</small></h2></div>
            <video id="vid" autoplay playsinline controls></video>
            <div id="ld-overlay"><div class="spinner"></div><p style="margin-top:15px; font-family: 'Barlow Condensed'; letter-spacing: 2px;">CONECTANDO...</p></div>
        </div>
        <div id="sbar">
            <span id="st-info">SISTEMA LISTO</span>
            <span id="schnm" style="margin-left: auto; color: var(--accent); font-weight: 700;"></span>
        </div>
    </div>

    <div id="side-panel">
        <div id="nav">
            <button class="nav-t on">LISTA DE CANALES</button>
        </div>
        <div id="clist"></div>
    </div>
</div>

<script>
'use strict';
let shaka_p, vid_el, playingUri = null;
const G = id => document.getElementById(id);

async function initPlayer() {
    vid_el = G('vid');
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
        alert('Navegador no soportado');
        return;
    }

    shaka_p = new shaka.Player(vid_el);

    // Configuración para permitir reproducir M3U8 y DASH indistintamente
    shaka_p.configure({
        manifest: { retryParameters: { maxAttempts: 5 } },
        streaming: { bufferingGoal: 15 }
    });

    shaka_p.addEventListener('error', (e) => {
        console.error('Error Shaka:', e.detail);
        G('ld-overlay').classList.remove('on');
        alert("Error al cargar canal. Revisa si el enlace o la llave DRM expiraron.");
    });

    loadChannels();
}

async function loadChannels() {
    try {
        const response = await fetch('channels.json');
        const data = await response.json();
        renderList(data);
        G('app').classList.add('in');
    } catch (e) {
        console.error("Error cargando JSON:", e);
    }
}

function renderList(categories) {
    const el = G('clist');
    el.innerHTML = '';

    categories.forEach(cat => {
        cat.samples.forEach(ch => {
            const row = document.createElement('div');
            row.className = `chi ${ch.uri === playingUri ? 'active' : ''}`;
            row.innerHTML = `
                <div class="chi-logo"><img src="${ch.icono}" onerror="this.src='https://via.placeholder.com/60?text=TV'"></div>
                <div class="chi-info">
                    <div class="chi-grp">${cat.name}</div>
                    <div class="chi-name">${ch.name}</div>
                </div>
            `;
            row.onclick = () => playCh(ch);
            el.appendChild(row);
        });
    });
}

async function playCh(ch) {
    if (!ch.uri) return;
    
    playingUri = ch.uri;
    G('schnm').textContent = ch.name;
    G('no-sig').classList.add('hidden');
    G('ld-overlay').classList.add('on');

    // CONFIGURACIÓN DRM (ClearKey)
    const drmConfig = {};
    if (ch.drm_license_uri) {
        const [keyId, key] = ch.drm_license_uri.split(':');
        drmConfig.clearKeys = { [keyId]: key };
    }

    try {
        await shaka_p.unload();
        shaka_p.configure({ drm: drmConfig });
        await shaka_p.load(ch.uri);
        vid_el.play();
        G('ld-overlay').classList.remove('on');
        
        // Actualizar UI de selección
        document.querySelectorAll('.chi').forEach(el => {
            el.classList.toggle('active', el.querySelector('.chi-name').textContent === ch.name);
        });
    } catch (e) {
        G('ld-overlay').classList.remove('on');
        console.error("Error de carga:", e);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
