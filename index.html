<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VICION TV</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
<style>
:root {
  --bg0: #04050a;
  --bg1: #080b12;
  --bg2: #0d1018;
  --bg3: #111520;
  --bg4: #161b28;
  --bg5: #1c2234;
  --glass: rgba(255,255,255,0.032);
  --glass2: rgba(255,255,255,0.06);
  --glass3: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.055);
  --border2: rgba(255,255,255,0.09);
  --border3: rgba(255,255,255,0.16);
  --accent: #00e5ff;
  --accent2: #0099cc;
  --accent-glow: rgba(0,229,255,0.18);
  --accent-subtle: rgba(0,229,255,0.05);
  --green: #00ff88;
  --green-glow: rgba(0,255,136,0.15);
  --red: #ff3d5a;
  --red-glow: rgba(255,61,90,0.2);
  --gold: #ffd166;
  --text: #e8edf5;
  --text2: #8896ab;
  --text3: #454f65;
  --text4: #2a3347;
  --r: 10px;
  --r2: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg0);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ═══ BACKGROUND AMBIENCE ═══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 50%, rgba(0,229,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 85% 20%, rgba(0,255,136,0.025) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 100%, rgba(0,153,204,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ═══ SPLASH ═══ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg0);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;
  transition: opacity .8s ease, visibility .8s;
}
#splash.gone { opacity: 0; visibility: hidden; pointer-events: none; }

.sp-emblem {
  position: relative;
  width: 110px; height: 110px;
  display: flex; align-items: center; justify-content: center;
}
.sp-ring1 {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid transparent;
  border-top-color: var(--accent);
  border-left-color: rgba(0,229,255,0.3);
  animation: spin 1.4s linear infinite;
}
.sp-ring2 {
  position: absolute; inset: 12px; border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: var(--green);
  border-right-color: rgba(0,255,136,0.25);
  animation: spin 2s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sp-hex {
  width: 72px; height: 72px;
  background: linear-gradient(145deg, rgba(0,229,255,0.12), rgba(0,0,0,0.4));
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 60px rgba(0,229,255,0.15), inset 0 1px 0 rgba(0,229,255,0.15);
}
.sp-hex svg { width: 28px; height: 28px; fill: var(--accent); }

.sp-brand {
  text-align: center;
}
.sp-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 52px;
  letter-spacing: 8px;
  line-height: 1;
  color: var(--text);
}
.sp-logo em { font-style: normal; color: var(--accent); }
.sp-sub {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--text3);
  margin-top: 8px;
}

.sp-progress {
  width: 240px;
}
.sp-track {
  height: 1px;
  background: var(--bg5);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sp-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--accent2), var(--accent), var(--green));
  animation: fill-prog 2s cubic-bezier(.4,0,.2,1) forwards;
  box-shadow: 0 0 12px var(--accent);
}
@keyframes fill-prog { to { width: 100%; } }
.sp-msg {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--text3);
  text-align: center;
}

/* ═══ APP ═══ */
#app {
  display: flex;
  flex-direction: row;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  z-index: 1;
  opacity: 0;
  transition: opacity .6s .2s;
}
#app.in { opacity: 1; }

/* ═══ LEFT COL ═══ */
#left-col {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* TOP BAR */
#topbar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 14px;
  padding: 10px 20px;
  background: linear-gradient(180deg, rgba(8,11,18,0.98) 0%, rgba(8,11,18,0.92) 100%);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  z-index: 100;
}
.tb-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(145deg, rgba(0,229,255,0.12), rgba(0,229,255,0.04));
  border: 1px solid rgba(0,229,255,0.2);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(0,229,255,0.1);
}
.tb-icon svg { width: 14px; height: 14px; fill: var(--accent); }

.tb-wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--text);
}
.tb-wordmark em { font-style: normal; color: var(--accent); }

.tb-divider {
  width: 1px; height: 18px;
  background: var(--border2);
  margin: 0 4px;
}

.tb-channel-info {
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transform: translateX(-6px);
  transition: all .3s ease;
}
.tb-channel-info.show { opacity: 1; transform: translateX(0); }
#tb-ch-logo {
  width: 22px; height: 22px;
  border-radius: 5px;
  object-fit: contain;
  background: var(--glass);
}
#tb-ch-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
}

.tb-spacer { flex: 1; }

.live-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  background: rgba(255,61,90,0.08);
  border: 1px solid rgba(255,61,90,0.2);
  border-radius: 99px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--red);
  opacity: 0;
  transition: opacity .3s;
}
.live-pill .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: pulse 1.4s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

/* PLAYER SECTION */
#player-section {
  flex: 1 1 auto;
  position: relative;
  background: #000;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
#player-wrap {
  position: relative;
  flex: 1 1 auto;
  width: 100%;
  min-height: 0;
  overflow: hidden;
}
video#vid {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

/* No signal */
#no-sig {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,229,255,0.03) 0%, #04050a 100%);
}
#no-sig.hidden { display: none; }
.ns-icon {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: rgba(0,229,255,0.04);
  border: 1px solid rgba(0,229,255,0.08);
  display: flex; align-items: center; justify-content: center;
}
.ns-icon svg { width: 28px; height: 28px; fill: none; stroke: rgba(0,229,255,0.2); stroke-width: 1.5; stroke-linecap: round; }
.ns-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text3);
}
.ns-hint {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text4);
}

/* Loader */
#ld-overlay {
  position: absolute; inset: 0; z-index: 3;
  background: rgba(4,5,10,0.85);
  backdrop-filter: blur(8px);
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
#ld-overlay.on { display: flex; }
.ld-spinner {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid var(--bg4);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
}
.ld-txt {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--text3);
}

/* Hover overlay */
#now-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  background: linear-gradient(to top, rgba(4,5,10,.98) 0%, rgba(4,5,10,.65) 50%, transparent 100%);
  padding: 48px 20px 14px;
  display: flex; align-items: flex-end; gap: 14px;
  transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
#player-wrap:hover #now-bar { transform: translateY(0); }
.nb-logo { width: 44px; height: 44px; border-radius: 10px; object-fit: contain; background: var(--glass2); border: 1px solid var(--border2); flex-shrink: 0; }
.nb-info { flex: 1; min-width: 0; }
.nb-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; color: #fff; }
.nb-meta { font-size: 12px; color: rgba(255,255,255,.35); margin-top: 3px; }
.nb-badge {
  padding: 4px 10px;
  background: var(--red);
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: #fff;
  flex-shrink: 0;
}

/* Audio tracks */
#audio-wrap {
  position: absolute; top: 12px; right: 12px; z-index: 5;
  display: flex; align-items: center; gap: 6px;
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: all .25s ease;
}
#audio-wrap.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.audio-label {
  display: flex; align-items: center; gap: 4px;
  font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  background: rgba(4,5,10,0.75);
  padding: 5px 9px; border-radius: 6px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.07);
}
#track-list { display: flex; gap: 5px; }
.trk-btn {
  padding: 5px 13px; border-radius: 99px;
  background: rgba(4,5,10,0.75); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .18s; white-space: nowrap;
  backdrop-filter: blur(12px);
}
.trk-btn:hover { border-color: rgba(255,255,255,0.25); color: #fff; }
.trk-btn.on { background: rgba(0,229,255,0.15); border-color: rgba(0,229,255,0.45); color: var(--accent); box-shadow: 0 0 16px rgba(0,229,255,0.15); }

/* STATUS BAR */
#sbar {
  flex-shrink: 0;
  height: 38px;
  background: linear-gradient(180deg, rgba(8,11,18,0.97) 0%, rgba(4,5,10,1) 100%);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.sbi {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px;
  color: var(--text3);
}
.sbi svg { width: 10px; height: 10px; fill: var(--text3); }
.sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text4); flex-shrink: 0;
  transition: all .3s;
}
.sdot.g { background: var(--green); box-shadow: 0 0 10px var(--green); }
.sdot.r { background: var(--red); box-shadow: 0 0 8px var(--red); }
.sdot.y { background: #ffc107; animation: pulse 0.8s ease infinite; }
.sbar-sep { width: 1px; height: 14px; background: var(--border); }
.sbar-r { margin-left: auto; }
.sbar-r .sbi { color: var(--accent); }
.sbar-r .sbi svg { fill: var(--accent); }
.sbar-ch-name { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ═══ RIGHT COLUMN ═══ */
#right-col {
  width: 330px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  overflow: hidden;
  background: var(--bg1);
  position: relative;
}

/* NAV TABS */
#nav {
  display: flex;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 8px 8px 0;
  gap: 4px;
}
.nav-t {
  flex: 1; padding: 9px 8px 10px; text-align: center;
  cursor: pointer; border: none; background: none;
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: var(--text3); border-bottom: 2px solid transparent;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  border-radius: 8px 8px 0 0;
}
.nav-t svg { width: 13px; height: 13px; fill: currentColor; }
.nav-t:hover:not(.on) { color: var(--text2); background: var(--glass); }
.nav-t.on {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--accent-subtle);
}

/* SEARCH */
#searchbar {
  padding: 10px 12px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.srch-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 8px 12px;
  transition: border-color .2s, box-shadow .2s;
}
.srch-wrap:focus-within {
  border-color: rgba(0,229,255,0.3);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.05);
}
.srch-wrap svg { width: 13px; height: 13px; fill: none; stroke: var(--text3); stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
.srch-wrap input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
}
.srch-wrap input::placeholder { color: var(--text3); }
.srch-clear {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 18px; line-height: 1;
  display: none; padding: 0; transition: color .15s;
}
.srch-clear.vis { display: block; }
.srch-clear:hover { color: var(--text2); }

/* CATEGORIES */
#cats-wrap {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 8px 0 8px 12px;
  position: relative;
}
#cats-wrap::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 32px;
  background: linear-gradient(to right, transparent, var(--bg1));
  pointer-events: none;
}
#cats {
  display: flex; gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-right: 32px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
#cats::-webkit-scrollbar { display: none; }

.cat-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border-radius: 99px;
  white-space: nowrap; flex-shrink: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.cat-btn:hover { color: var(--text2); border-color: var(--border2); background: var(--bg4); }
.cat-btn.on {
  background: linear-gradient(135deg, rgba(0,229,255,0.14), rgba(0,229,255,0.05));
  border-color: rgba(0,229,255,0.35);
  color: var(--accent);
  box-shadow: 0 0 16px rgba(0,229,255,0.08);
}
.cat-icon { font-size: 12px; }
.cat-count {
  padding: 1px 6px; border-radius: 8px;
  font-size: 10px;
  background: var(--bg5); color: var(--text4);
}
.cat-btn.on .cat-count { background: rgba(0,229,255,0.12); color: var(--accent); }

/* CHANNEL LIST */
#ch-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
}
#ch-scroll::-webkit-scrollbar { width: 3px; }
#ch-scroll::-webkit-scrollbar-track { background: transparent; }
#ch-scroll::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }
#ch-scroll::-webkit-scrollbar-thumb:hover { background: var(--bg4); }

#clist { background: var(--bg0); }

.ch-item {
  display: flex; align-items: center;
  padding: 10px 14px; gap: 11px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  position: relative;
  user-select: none;
}
.ch-item:hover { background: var(--bg2); }
.ch-item.active {
  background: linear-gradient(to right, rgba(0,229,255,0.07), rgba(0,229,255,0.02));
}
.ch-item.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, var(--accent), rgba(0,229,255,0.3));
  box-shadow: 0 0 12px rgba(0,229,255,0.5);
}

.ch-num {
  width: 28px;
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: var(--text4); text-align: right; flex-shrink: 0;
  letter-spacing: 0;
}
.ch-logo {
  width: 38px; height: 38px;
  border-radius: 9px; flex-shrink: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.ch-logo img { width: 100%; height: 100%; object-fit: contain; }
.ch-abbr { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; color: var(--text3); }
.ch-pip {
  position: absolute; bottom: 3px; right: 3px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 1.6s ease infinite;
}

.ch-info { flex: 1; min-width: 0; }
.ch-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.ch-item.active .ch-name { color: #fff; }
.ch-meta {
  display: flex; align-items: center; gap: 5px;
  margin-top: 3px;
}
.ch-live-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); animation: pulse 2s ease infinite; }
.ch-live-txt { font-size: 10px; color: var(--text3); }
.ch-sep { width: 2px; height: 2px; border-radius: 50%; background: var(--text4); flex-shrink: 0; }
.ch-group { font-size: 10px; color: var(--text4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-nosig { font-size: 10px; color: var(--text4); }

.ch-fav {
  width: 28px; height: 28px; border-radius: 7px;
  border: none; background: none;
  color: var(--text4); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.ch-fav:hover { background: var(--glass2); color: var(--text2); }
.ch-fav.on { color: var(--gold); text-shadow: 0 0 12px rgba(255,209,102,0.6); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: 60px 24px;
  text-align: center;
}
.empty-icon { font-size: 36px; opacity: .3; }
.empty-title {
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 3px; color: var(--text3);
}
.empty-sub { font-size: 12px; color: var(--text4); }

/* ═══ TOAST ═══ */
#toast {
  position: fixed; top: 64px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  z-index: 9998;
  min-width: 240px; max-width: 55vw;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 11px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text2);
  opacity: 0; pointer-events: none;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 0 transparent;
  backdrop-filter: blur(20px);
}
#toast.vis {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.ok { border-color: rgba(0,229,255,.3); color: var(--accent); box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 30px rgba(0,229,255,0.08); }
#toast.err { border-color: rgba(255,61,90,.3); color: var(--red); }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-emblem">
    <div class="sp-ring1"></div>
    <div class="sp-ring2"></div>
    <div class="sp-hex">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>
  <div class="sp-brand">
    <div class="sp-logo">VICION <em>TV</em></div>
    <div class="sp-sub">PREMIUM · EN VIVO · HD</div>
  </div>
  <div class="sp-progress">
    <div class="sp-track"><div class="sp-fill"></div></div>
    <div class="sp-msg" id="sp-msg">Iniciando sistema...</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- IZQUIERDA: PLAYER -->
  <div id="left-col">

    <div id="topbar">
      <div class="tb-icon">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="tb-wordmark">VICION <em>TV</em></div>
      <div class="tb-divider"></div>
      <div class="tb-channel-info" id="tb-ch-info">
        <img id="tb-ch-logo" src="" alt="">
        <span id="tb-ch-name">—</span>
      </div>
      <div class="tb-spacer"></div>
      <div class="live-pill" id="live-badge">
        <div class="dot"></div>EN VIVO
      </div>
    </div>

    <div id="player-section">
      <div id="player-wrap">

        <div id="no-sig">
          <div class="ns-icon">
            <svg viewBox="0 0 24 24"><polyline points="1 1 23 23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
          </div>
          <div class="ns-title">SELECCIONÁ UN CANAL</div>
          <div class="ns-hint">→ elige de la lista a la derecha</div>
        </div>

        <video id="vid" autoplay playsinline controls></video>

        <div id="now-bar">
          <img id="nb-logo" class="nb-logo" src="" alt="">
          <div class="nb-info">
            <div class="nb-name" id="nb-name">—</div>
            <div class="nb-meta">En vivo · VICION TV</div>
          </div>
          <div class="nb-badge">● LIVE</div>
        </div>

        <div id="ld-overlay">
          <div class="ld-spinner"></div>
          <div class="ld-txt">CONECTANDO</div>
        </div>

        <div id="audio-wrap">
          <div class="audio-label">AUDIO</div>
          <div id="track-list"></div>
        </div>

      </div>
    </div>

    <div id="sbar">
      <div class="sbi">
        <div class="sdot" id="sdot"></div>
        <span id="slbl">Sin señal</span>
      </div>
      <div class="sbar-sep"></div>
      <div class="sbi">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
        <span id="scnt">0 canales</span>
      </div>
      <div class="sbar-r" id="sbar-r" style="display:none">
        <div class="sbi">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <span class="sbar-ch-name" id="schnm"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- DERECHA: LISTA -->
  <div id="right-col">

    <div id="nav">
      <button class="nav-t on" data-tab="channels">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
        CANALES
      </button>
      <button class="nav-t" data-tab="favs">
        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        FAVORITOS
      </button>
    </div>

    <div id="searchbar">
      <div class="srch-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="srch" type="text" placeholder="Buscar canal...">
        <button class="srch-clear" id="srch-clr">×</button>
      </div>
    </div>

    <div id="cats-wrap">
      <div id="cats"></div>
    </div>

    <div id="ch-scroll">
      <div id="clist"></div>
    </div>

  </div>

</div>

<!-- TOAST -->
<div id="toast">
  <span id="toast-msg"></span>
</div>

<script>
'use strict';

const LANGS = {
  spa:{flag:'🇪🇸',label:'Español'}, es:{flag:'🇪🇸',label:'Español'},
  eng:{flag:'🇺🇸',label:'English'}, en:{flag:'🇺🇸',label:'English'},
  por:{flag:'🇧🇷',label:'Português'}, pt:{flag:'🇧🇷',label:'Português'},
  fra:{flag:'🇫🇷',label:'Français'}, fr:{flag:'🇫🇷',label:'Français'},
  deu:{flag:'🇩🇪',label:'Deutsch'}, de:{flag:'🇩🇪',label:'Deutsch'},
  ita:{flag:'🇮🇹',label:'Italiano'}, it:{flag:'🇮🇹',label:'Italiano'},
  und:{flag:'🌐',label:'Original'},
};
const langInfo = c => { if(!c) return null; const k=c.toLowerCase(); return LANGS[k]||{flag:'🌐',label:c.toUpperCase()}; };

const G = id => document.getElementById(id);

let shakaPlayer, vidEl;
let allData = [], favs = [];
let curTab = 'channels', curCat = 0, curSrch = '';
let playingUri = null, isLoading = false, loadTimer = null;

const DEMO = [
  {name:'Deportivos', icon:'⚽', samples:[
    {name:'ESPN 3 UY-PY', uri:'https://cnn-cnninternational-1-gb.samsung.wurl.com/manifest/playlist.m3u8', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/ESPN_wordmark.svg/200px-ESPN_wordmark.svg.png', group_title:'Deportivos'},
    {name:'TyC Sports', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Tycsports.png/240px-Tycsports.png', group_title:'Deportivos'},
    {name:'Fox Sports', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/FOX_Sports_logo.svg/200px-FOX_Sports_logo.svg.png', group_title:'Deportivos'},
    {name:'DirecTV Sports', uri:'', icono:'', group_title:'Deportivos'},
  ]},
  {name:'Noticias', icon:'📰', samples:[
    {name:'CNN en Español', uri:'https://cnn-cnninternational-1-gb.samsung.wurl.com/manifest/playlist.m3u8', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/CNN.svg/200px-CNN.svg.png', group_title:'Noticias'},
    {name:'France 24 ES', uri:'https://static.france24.com/live/F24_ES_LO_HLS/live_web.m3u8', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/France_24_logo.svg/200px-France_24_logo.svg.png', group_title:'Noticias'},
    {name:'BBC World News', uri:'https://vs-cmaf-push-worldnews-uk.akamaized.net/x=4/i=urn:bbc:piff:service:world_news_english/pc_hd_abr_v2.mpd', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/BBC_World_News_2022.svg/200px-BBC_World_News_2022.svg.png', group_title:'Noticias'},
    {name:'Al Jazeera', uri:'https://live-hls-web-aje.getaj.net/AJE/index.m3u8', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Al_Jazeera_English_Logo.svg/200px-Al_Jazeera_English_Logo.svg.png', group_title:'Noticias'},
    {name:'DW Noticias', uri:'https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/index.m3u8', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Deutsche_Welle_symbol_2012.svg/200px-Deutsche_Welle_symbol_2012.svg.png', group_title:'Noticias'},
  ]},
  {name:'Entretenimiento', icon:'🎬', samples:[
    {name:'TVE Internacional', uri:'https://ztnr.rtve.es/ztnr/1688877.m3u8', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/TVE_Internacional_2008.svg/240px-TVE_Internacional_2008.svg.png', group_title:'Entretenimiento'},
    {name:'Antena 3', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Antena_3_logo_2019.svg/240px-Antena_3_logo_2019.svg.png', group_title:'Entretenimiento'},
  ]},
  {name:'Infantil', icon:'🧸', samples:[
    {name:'Cartoon Network', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Cartoon_Network_2010_logo.svg/200px-Cartoon_Network_2010_logo.svg.png', group_title:'Infantil'},
    {name:'Disney Channel', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Disney_Channel_2019.svg/200px-Disney_Channel_2019.svg.png', group_title:'Infantil'},
  ]},
  {name:'Películas', icon:'🎥', samples:[
    {name:'TCM Latinoamérica', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/TCM_2021_logo.svg/200px-TCM_2021_logo.svg.png', group_title:'Películas'},
    {name:'AMC', uri:'', icono:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/AMC_TV_logo.svg/200px-AMC_TV_logo.svg.png', group_title:'Películas'},
  ]},
];

function configShaka() {
  shakaPlayer.configure({
    streaming: {
      bufferingGoal: 10, rebufferingGoal: 2, bufferBehind: 15,
      retryParameters: { maxAttempts: 3, baseDelay: 100, backoffFactor: 1.5, timeout: 8000 },
      stallEnabled: true, stallThreshold: 1,
    },
    manifest: { retryParameters: { maxAttempts: 3, baseDelay: 100, timeout: 8000 } },
  });
}

async function boot() {
  vidEl = G('vid');
  shaka.polyfill.installAll();
  shakaPlayer = new shaka.Player(vidEl);
  configShaka();

  shakaPlayer.addEventListener('error', () => {
    clearLoadTimer(); isLoading = false;
    hideLoader(); setSig('err');
    showToast('No se pudo conectar con el canal', 'err');
    G('no-sig').classList.remove('hidden');
    G('live-badge').style.opacity = '0';
    G('tb-ch-info').classList.remove('show');
    closeAudio(); renderList();
  });

  shakaPlayer.addEventListener('trackschanged', buildAudio);

  vidEl.addEventListener('playing', () => {
    clearLoadTimer(); isLoading = false;
    hideLoader(); setSig('ok');
    G('no-sig').classList.add('hidden');
    G('live-badge').style.opacity = '1';
  });
  vidEl.addEventListener('waiting', () => { if(!isLoading) showLoader(); });
  vidEl.addEventListener('pause', hideLoader);
  vidEl.addEventListener('ended', () => { setSig('none'); G('live-badge').style.opacity='0'; });

  const msgs = ['Iniciando sistema...','Cargando canales...','Configurando reproductor...','Listo ✓'];
  let mi = 0;
  const mt = setInterval(() => { if(mi < msgs.length) G('sp-msg').textContent = msgs[mi++]; }, 500);

  try {
    const r = await fetch('channels.json?t=' + Date.now());
    allData = await r.json();
  } catch(_) { allData = DEMO; }

  favs = JSON.parse(localStorage.getItem('vicion_favs') || '[]');
  clearInterval(mt);
  G('sp-msg').textContent = 'Listo ✓';

  buildCats();
  renderList();

  const last = JSON.parse(localStorage.getItem('vicion_last') || 'null');
  if(last) playCh(last);

  // Events
  G('srch').addEventListener('input', e => {
    curSrch = e.target.value;
    G('srch-clr').classList.toggle('vis', !!curSrch);
    renderList();
  });
  G('srch-clr').addEventListener('click', () => {
    curSrch = ''; G('srch').value = '';
    G('srch-clr').classList.remove('vis');
    renderList();
  });
  document.querySelectorAll('.nav-t').forEach(b => b.addEventListener('click', () => {
    curTab = b.dataset.tab;
    document.querySelectorAll('.nav-t').forEach(x => x.classList.toggle('on', x===b));
    curSrch = ''; G('srch').value = '';
    G('srch-clr').classList.remove('vis');
    renderList();
  }));

  // Cats: allow drag/touch scroll
  enableDragScroll(G('cats'));

  setTimeout(() => {
    G('splash').classList.add('gone');
    G('app').classList.add('in');
  }, 2200);
}

function enableDragScroll(el) {
  let down = false, startX, scrollL;
  el.addEventListener('mousedown', e => { down=true; startX=e.pageX-el.offsetLeft; scrollL=el.scrollLeft; el.style.cursor='grabbing'; });
  el.addEventListener('mouseleave', () => { down=false; el.style.cursor=''; });
  el.addEventListener('mouseup', () => { down=false; el.style.cursor=''; });
  el.addEventListener('mousemove', e => { if(!down) return; e.preventDefault(); const x=e.pageX-el.offsetLeft; el.scrollLeft=scrollL-(x-startX); });
}

function buildCats() {
  const c = G('cats'); c.innerHTML = '';
  allData.forEach((cat, i) => {
    const n = cat.samples?.length || 0;
    const btn = document.createElement('button');
    btn.className = `cat-btn${i===curCat?' on':''}`;
    btn.innerHTML = `<span class="cat-icon">${cat.icon||'📺'}</span>${cat.name}<span class="cat-count">${n}</span>`;
    btn.addEventListener('click', () => {
      curCat = i; curTab = 'channels';
      document.querySelectorAll('.nav-t').forEach((b,j)=>b.classList.toggle('on',j===0));
      document.querySelectorAll('.cat-btn').forEach((x,j)=>x.classList.toggle('on',j===i));
      // Scroll cat into view
      btn.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
      renderList();
    });
    c.appendChild(btn);
  });
}

function getChs() {
  let list = curTab==='favs' ? [...favs] : (allData[curCat]?.samples || []);
  if(curSrch) list = list.filter(c => c.name.toLowerCase().includes(curSrch.toLowerCase()));
  return list;
}

function renderList() {
  const chs = getChs();
  G('scnt').textContent = `${chs.length} canal${chs.length!==1?'es':''}`;
  const el = G('clist');

  if(!chs.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">SIN RESULTADOS</div>
      <div class="empty-sub">Intenta con otro término</div>
    </div>`;
    return;
  }

  // Smart update: only toggle active/fav states if same list
  const existing = el.querySelectorAll('.ch-item');
  if(existing.length === chs.length) {
    existing.forEach((row, i) => {
      const ch = chs[i];
      const isActive = ch.uri && ch.uri === playingUri;
      row.classList.toggle('active', isActive);
      const pip = row.querySelector('.ch-pip');
      if(isActive && !pip) {
        const logo = row.querySelector('.ch-logo');
        const p = document.createElement('div'); p.className='ch-pip';
        logo.appendChild(p);
      } else if(!isActive && pip) pip.remove();
      const isFav = favs.some(f=>f.name===ch.name&&f.uri===ch.uri);
      const favBtn = row.querySelector('.ch-fav');
      favBtn.classList.toggle('on', isFav);
      favBtn.title = isFav ? 'Quitar de favoritos' : 'Añadir a favoritos';
    });
    return;
  }

  // Full render
  el.innerHTML = '';
  const frag = document.createDocumentFragment();
  chs.forEach((ch, i) => {
    const isFav = favs.some(f=>f.name===ch.name&&f.uri===ch.uri);
    const isActive = ch.uri && ch.uri === playingUri;
    const num = String(i+1).padStart(3,'0');

    const row = document.createElement('div');
    row.className = `ch-item${isActive?' active':''}`;

    const logoHtml = ch.icono
      ? `<img src="${ch.icono}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ch-abbr" style="display:none">${abbr(ch.name)}</span>`
      : `<span class="ch-abbr">${abbr(ch.name)}</span>`;

    row.innerHTML = `
      <div class="ch-num">${num}</div>
      <div class="ch-logo">${logoHtml}${isActive?'<div class="ch-pip"></div>':''}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-meta">
          ${ch.uri
            ? `<div class="ch-live-dot"></div><span class="ch-live-txt">En vivo</span>`
            : `<span class="ch-nosig">Sin señal</span>`}
          ${ch.group_title ? `<div class="ch-sep"></div><span class="ch-group">${ch.group_title}</span>` : ''}
        </div>
      </div>
      <button class="ch-fav${isFav?' on':''}" title="${isFav?'Quitar':'Añadir a favoritos'}">★</button>
    `;

    row.querySelector('.ch-fav').addEventListener('click', e => { e.stopPropagation(); toggleFav(ch); });
    if(ch.uri) row.addEventListener('click', () => playCh(ch));
    frag.appendChild(row);
  });
  el.appendChild(frag);
}

function abbr(n) { return (n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'TV'; }

function toggleFav(ch) {
  const idx = favs.findIndex(f=>f.name===ch.name&&f.uri===ch.uri);
  if(idx>-1) favs.splice(idx,1); else favs.push(ch);
  localStorage.setItem('vicion_favs', JSON.stringify(favs));
  showToast(idx>-1 ? 'Quitado de favoritos' : '⭐ Añadido a favoritos', idx>-1?'':'ok');
  renderList();
}

async function playCh(ch) {
  if(!ch.uri) { showToast('Canal sin señal disponible', 'err'); return; }
  if(isLoading) {
    clearLoadTimer();
    try { await shakaPlayer.unload(); } catch(_) {}
    isLoading = false;
  }
  if(ch.uri === playingUri && !vidEl.paused) return;

  playingUri = ch.uri;
  isLoading = true;
  localStorage.setItem('vicion_last', JSON.stringify(ch));

  // Update UI
  G('nb-logo').src = ch.icono||'';
  G('nb-name').textContent = ch.name;
  G('tb-ch-logo').src = ch.icono||'';
  G('tb-ch-name').textContent = ch.name;
  G('tb-ch-info').classList.add('show');
  G('sbar-r').style.display = 'flex';
  G('schnm').textContent = ch.name;
  G('no-sig').classList.add('hidden');
  showLoader(); setSig('load'); closeAudio(); renderList();

  loadTimer = setTimeout(() => {
    if(isLoading) {
      isLoading = false; hideLoader(); setSig('err');
      showToast('Tiempo de espera agotado', 'err');
      G('no-sig').classList.remove('hidden');
      G('live-badge').style.opacity='0';
      playingUri = null; renderList();
    }
  }, 15000);

  try {
    await shakaPlayer.unload();
    configShaka();
    if(ch.drm_license_uri) {
      const [id,key] = ch.drm_license_uri.split(':');
      shakaPlayer.configure({ drm:{ clearKeys:{ [id]:key } } });
    }
    await shakaPlayer.load(ch.uri);
    vidEl.play().catch(()=>{});
  } catch(e) {
    clearLoadTimer(); isLoading = false;
    hideLoader(); setSig('err');
    showToast('Error al cargar el canal', 'err');
    G('no-sig').classList.remove('hidden');
    G('live-badge').style.opacity='0';
    playingUri = null; renderList();
  }
}

function clearLoadTimer() { if(loadTimer){ clearTimeout(loadTimer); loadTimer=null; } }

function buildAudio() {
  const tl = G('track-list'); tl.innerHTML = '';
  const aw = G('audio-wrap');
  let tracks = [];
  try { tracks = shakaPlayer.getAudioLanguagesAndRoles(); } catch(_) {}
  const seen = new Set();
  const uniq = tracks.filter(t => { if(seen.has(t.language)) return false; seen.add(t.language); return true; });
  if(uniq.length < 2) { aw.classList.remove('open'); return; }
  const curLang = shakaPlayer.getAudioLanguage();
  uniq.forEach(t => {
    const info = langInfo(t.language);
    const lbl = info ? `${info.flag} ${info.label}` : t.language.toUpperCase();
    const btn = document.createElement('button');
    btn.className = `trk-btn${t.language===curLang?' on':''}`;
    btn.textContent = lbl;
    btn.addEventListener('click', () => {
      shakaPlayer.selectAudioLanguage(t.language, t.role);
      document.querySelectorAll('.trk-btn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      const i2 = langInfo(t.language);
      showToast(`🔊 Audio: ${i2?i2.label:t.language}`, 'ok');
    });
    tl.appendChild(btn);
  });
  aw.classList.add('open');
}

function closeAudio() { G('audio-wrap').classList.remove('open'); G('track-list').innerHTML=''; }
function showLoader() { G('ld-overlay').classList.add('on'); }
function hideLoader() { G('ld-overlay').classList.remove('on'); }

function setSig(s) {
  const d=G('sdot'), l=G('slbl');
  if(s==='ok')   { d.className='sdot g'; l.textContent='Señal activa'; }
  else if(s==='err')  { d.className='sdot r'; l.textContent='Sin señal'; }
  else if(s==='load') { d.className='sdot y'; l.textContent='Conectando...'; }
  else                { d.className='sdot';   l.textContent='Sin señal'; }
}

let toastTimer;
function showToast(msg, type='') {
  const t = G('toast');
  G('toast-msg').textContent = msg;
  t.className = `vis${type?' '+type:''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className=''; }, 3000);
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
